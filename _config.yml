# CDT501 Personal Blog Configuration
title: XUN's Blog
description: A light-themed tech blog
url: https://xun-n.github.io
baseurl: /xun-n

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title.html

# Exclude from build
exclude:
  - README.md
  - Makefile
  - screenshot.png
  - Gemfile
  - Gemfile.lock

# Collections
collections:
  projects:
    output: true
  cdt502-steps:
    output: true
    permalink: /cdt502/steps/:name/
  cdt502-source:
    output: true
    permalink: /cdt502/source/:name/

# Navigation
navigation:
  - title: Home
    link: /
  - title: Blog
    link: /blog.html
  - title: CDT502
    link: /cdt502.html
  - title: About
    link: /about.html
  - title: Projects
    link: /projects.html

# Social links
social:
  github: https://github.com/XUN-N
  email: xun@example.com

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: XUN
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project
  - scope:
      path: ""
      type: "cdt502-steps"
    values:
      layout: cdt502-step
  - scope:
      path: ""
      type: "cdt502-source"
    values:
      layout: cdt502-source
