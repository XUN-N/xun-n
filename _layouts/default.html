<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    
    <!-- Theme initialization script (prevent flash) -->
    <script>
        (function() {
            const stored = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = stored || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-inner">
            <div class="site-title">
                <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
            </div>
            
            <!-- Include Navigation -->
            {% include navigation.html %}
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>
                &copy; {{ site.time | date: '%Y' }} {{ site.title }}. 
                Built with <a href="https://jekyllrb.com/" target="_blank" rel="noopener">Jekyll</a> & 
                <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a>.
            </p>
            {% if site.social %}
            <p>
                {% if site.social.github %}
                <a href="{{ site.social.github }}" target="_blank" rel="noopener">GitHub</a>
                {% endif %}
                {% if site.social.email %}
                · <a href="mailto:{{ site.social.email }}">Email</a>
                {% endif %}
            </p>
            {% endif %}
        </div>
    </footer>

    <!-- Scripts -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    
    <!-- Screen reader announcements container -->
    <div id="sr-announcements" class="sr-only" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
